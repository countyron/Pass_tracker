<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-touch-fullscreen" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1628">
<title>Swim Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --dk:#0a1628;--mid:#0d3b66;--blue:#1a73e8;--light:#4fc3f7;--sky:#b3e5fc;
  --foam:#e1f5fe;--bg:#f0f7ff;--card:#ffffff;--tx:#0d1b2a;--txs:#546e7a;
  --bdr:#b0cfe0;--gn:#c8e6c9;--gnt:#1b5e20;--rd:#ffcdd2;--rdt:#b71c1c;
  --am:#fff3cd;--amt:#7c4a00;--rad:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  color:var(--tx);background:var(--bg);
  max-width:430px;margin:0 auto;
  overflow-x:hidden;touch-action:pan-y;
  -webkit-overflow-scrolling:touch;
  min-height:100vh;min-height:100dvh;
  position:relative;
}
body::before{
  content:'';position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:430px;height:100%;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(79,195,247,.10) 0%,transparent 65%);
}

/* ─── HEADER (matches pool_availability_v19) ─── */
.header{
  background:linear-gradient(135deg,#0a1628 0%,#0d3b66 40%,#1a73e8 80%,#4fc3f7 100%);
  color:#fff;
  padding:calc(var(--safe-top) + 20px) 16px 0;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.header::after{
  content:'';position:absolute;top:0;left:-100%;width:200%;height:100%;
  background:linear-gradient(90deg,transparent 40%,rgba(255,255,255,.04) 50%,transparent 60%);
  animation:shimmer 6s ease-in-out infinite;pointer-events:none;
}
@keyframes shimmer{0%,100%{transform:translateX(-30%)}50%{transform:translateX(30%)}}
.header h1{
  font-size:22px;font-weight:700;letter-spacing:.3px;
  position:relative;z-index:3;
  text-shadow:0 2px 8px rgba(0,0,0,.35);
}
.header p{
  font-size:12px;opacity:.85;margin-top:3px;
  position:relative;z-index:3;letter-spacing:.2px;
  text-shadow:0 1px 4px rgba(0,0,0,.3);
}
.header-spacer{height:12px}

/* Wave (matches pool_availability_v19 exactly) */
.wave-container{
  position:relative;width:100%;height:35px;overflow:hidden;
  margin-top:8px;
}
.wave-track{
  display:flex;width:200%;height:100%;
  animation:waveScroll 10s linear infinite;
}
@keyframes waveScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.wave-track svg{width:50%;height:100%;flex-shrink:0}

/* ─── TABS ─── */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100}
.tab{
  flex:1;padding:11px 0;text-align:center;font-size:13px;font-weight:600;
  color:var(--txs);cursor:pointer;border:none;background:none;
  border-bottom:2.5px solid transparent;transition:all .2s;font-family:inherit;
}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ─── CONTENT ─── */
.content{padding:14px;position:relative;z-index:1;padding-bottom:calc(80px + var(--safe-bottom))}
.tab-panel{display:none}.tab-panel.active{display:block}

/* ─── CARDS ─── */
.card{
  background:var(--card);border:1px solid var(--bdr);
  border-radius:var(--rad);box-shadow:0 1px 4px rgba(0,0,0,.06);
  padding:14px;margin-bottom:12px;
}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--txs);margin-bottom:8px}

/* ─── STAT GRID ─── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{
  background:var(--card);border:1px solid var(--bdr);
  border-radius:var(--rad);box-shadow:0 1px 4px rgba(0,0,0,.06);
  padding:12px 10px;text-align:center;
}
.stat-val{font-size:26px;font-weight:700;color:var(--blue);line-height:1.1}
.stat-val span{font-size:14px;font-weight:600}
.stat-lbl{font-size:10px;color:var(--txs);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.stat-sub{font-size:10px;color:var(--txs);margin-top:1px}

/* ─── PROGRESS ─── */
.progress-wrap{width:100%;height:22px;background:#dce8f5;border-radius:11px;overflow:hidden;position:relative;margin-top:8px}
.progress-bar{height:100%;border-radius:11px;transition:width .6s ease;background:linear-gradient(90deg,var(--blue),var(--light))}
.progress-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700;color:var(--tx)}

/* ─── POOL PILLS ─── */
.pool-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.pool-pill{flex:1;min-width:110px;background:var(--foam);border:1px solid var(--sky);border-radius:10px;padding:10px;text-align:center}
.pill-name{font-size:11px;font-weight:600;color:var(--mid)}
.pill-count{font-size:22px;font-weight:700;color:var(--blue);margin:2px 0}
.pill-sub{font-size:10px;color:var(--txs)}

/* ─── LOG TABLE ─── */
.log-table{width:100%;border-collapse:collapse;font-size:12px}
.log-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--txs);padding:8px 5px;border-bottom:2px solid var(--bdr);font-weight:700}
.log-table td{padding:9px 5px;border-bottom:1px solid #e8eff7;vertical-align:middle}
.log-table tr:last-child td{border-bottom:none}
.pool-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
.pool-tag.manly{background:#e3f2fd;color:#0d47a1}
.pool-tag.warringah{background:var(--gn);color:var(--gnt)}
.pool-tag.openwater{background:var(--am);color:var(--amt)}
.log-actions button{background:none;border:none;cursor:pointer;padding:3px;font-size:14px;opacity:.45}
.log-actions button:hover{opacity:1}

/* ─── FAB ─── */
.fab{
  position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;transform:translateX(-50%);
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--mid),var(--blue));
  color:#fff;border:none;font-size:28px;line-height:1;
  box-shadow:0 4px 14px rgba(13,59,102,.35);cursor:pointer;z-index:200;
  display:flex;align-items:center;justify-content:center;transition:transform .2s;
}
.fab:active{transform:translateX(-50%) scale(.9)}

/* ─── MODAL ─── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(10,22,40,.45);z-index:300;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);width:100%;max-width:430px;border-radius:16px 16px 0 0;padding:20px 20px calc(20px + var(--safe-bottom));animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:17px;font-weight:700;margin-bottom:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--txs);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:15px;font-family:inherit;background:#f8fafc;color:var(--tx)}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,115,232,.12)}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btns button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.btn-cancel{background:#e8eff7;color:var(--tx)}
.btn-save{background:linear-gradient(135deg,var(--mid),var(--blue));color:#fff}
.btn-delete{background:#ef4444;color:#fff;flex:.5}

/* ─── CHART ─── */
.chart-box{position:relative;width:100%;margin-top:6px}
.chart-box canvas{width:100%!important}

/* ─── FOOTER ─── */
.build-footer{text-align:center;font-size:10px;color:var(--txs);padding:16px 12px 8px;opacity:.55}

::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<!-- HEADER (pool_availability style) -->
<div class="header">
  <h1>🏊 Swim Tracker</h1>
  <p>Annual Pass · Warringah & Manly Aquatic Centres</p>
  <div class="header-spacer"></div>
  <div class="wave-container">
    <div class="wave-track">
      <svg viewBox="0 0 1200 35" preserveAspectRatio="none">
        <path d="M0,18 C100,28 200,8 300,18 C400,28 500,8 600,18 C700,28 800,8 900,18 C1000,28 1100,8 1200,18 L1200,35 L0,35Z" fill="rgba(240,247,255,.25)"/>
        <path d="M0,22 C80,32 180,12 300,22 C420,32 500,12 600,22 C700,32 820,12 900,22 C1020,32 1100,12 1200,22 L1200,35 L0,35Z" fill="rgba(240,247,255,.5)"/>
        <path d="M0,28 C150,35 250,22 400,28 C550,35 650,22 800,28 C950,35 1050,22 1200,28 L1200,35 L0,35Z" fill="#f0f7ff"/>
      </svg>
      <svg viewBox="0 0 1200 35" preserveAspectRatio="none">
        <path d="M0,18 C100,28 200,8 300,18 C400,28 500,8 600,18 C700,28 800,8 900,18 C1000,28 1100,8 1200,18 L1200,35 L0,35Z" fill="rgba(240,247,255,.25)"/>
        <path d="M0,22 C80,32 180,12 300,22 C420,32 500,12 600,22 C700,32 820,12 900,22 C1020,32 1100,12 1200,22 L1200,35 L0,35Z" fill="rgba(240,247,255,.5)"/>
        <path d="M0,28 C150,35 250,22 400,28 C550,35 650,22 800,28 C950,35 1050,22 1200,28 L1200,35 L0,35Z" fill="#f0f7ff"/>
      </svg>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="overview">Overview</button>
  <button class="tab" data-tab="charts">Charts</button>
  <button class="tab" data-tab="log">Log</button>
</div>

<div class="content">
  <div class="tab-panel active" id="tab-overview">
    <div class="stat-grid" id="statGrid"></div>
    <div class="card" style="margin-top:12px" id="breakEvenCard"></div>
    <div class="card" id="poolBreakdown"></div>
  </div>

  <div class="tab-panel" id="tab-charts">
    <div class="card"><div class="card-title">Cumulative Distance</div><div class="chart-box"><canvas id="chartDist"></canvas></div></div>
    <div class="card"><div class="card-title">Visits per Week</div><div class="chart-box"><canvas id="chartWeek"></canvas></div></div>
    <div class="card"><div class="card-title">Break-Even Projection</div><div class="chart-box"><canvas id="chartProj"></canvas></div></div>
  </div>

  <div class="tab-panel" id="tab-log">
    <div class="card" style="padding:6px 0">
      <table class="log-table" id="logTable">
        <thead><tr><th>#</th><th>Date</th><th>Pool</th><th>Dist</th><th>$/Visit</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<div class="build-footer" id="buildFooter"></div>
<button class="fab" id="fabAdd">+</button>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Add Visit</h2>
    <div class="fg"><label>Date</label><input type="date" id="inDate"></div>
    <div class="fg"><label>Pool</label>
      <select id="inPool">
        <option value="Manly ABC">Manly ABC</option>
        <option value="Warringah">Warringah</option>
        <option value="Open Water">Open Water</option>
      </select>
    </div>
    <div class="fg"><label>Distance (m)</label><input type="number" id="inDist" min="0" step="50" placeholder="0"></div>
    <div class="modal-btns" id="modalBtns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveVisit()">Save</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY='swim-tracker-v4';
const PASS_COST=898.47;
const PASS_START='2026-05-27';
const PASS_END='2027-05-27';
const CASUAL_COST=8.80;
const BE_NEEDED=Math.ceil(PASS_COST/CASUAL_COST);
const BUILD='15 Jun 2026 18:20 AEST';

const SEED=[
  {date:'2026-05-25',pool:'Manly ABC',distance:0},
  {date:'2026-05-27',pool:'Manly ABC',distance:1200},
  {date:'2026-05-29',pool:'Manly ABC',distance:2100},
  {date:'2026-05-30',pool:'Manly ABC',distance:2000},
  {date:'2026-05-31',pool:'Warringah',distance:2300},
  {date:'2026-06-04',pool:'Manly ABC',distance:2100},
  {date:'2026-06-06',pool:'Warringah',distance:2300},
  {date:'2026-06-07',pool:'Manly ABC',distance:2000},
  {date:'2026-06-08',pool:'Warringah',distance:3000},
  {date:'2026-06-08',pool:'Manly ABC',distance:0},
  {date:'2026-06-09',pool:'Manly ABC',distance:2000},
  {date:'2026-06-11',pool:'Warringah',distance:2100},
  {date:'2026-06-13',pool:'Warringah',distance:2100},
  {date:'2026-06-14',pool:'Manly ABC',distance:1700},
  {date:'2026-06-15',pool:'Warringah',distance:3600},
  {date:'2026-06-15',pool:'Manly ABC',distance:0}
];

let visits=[],editIdx=-1;
function load(){const s=localStorage.getItem(STORAGE_KEY);visits=s?JSON.parse(s):JSON.parse(JSON.stringify(SEED));save()}
function save(){visits.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);localStorage.setItem(STORAGE_KEY,JSON.stringify(visits))}

function todayStr(){return new Date().toISOString().slice(0,10)}
function fmtD(d){const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0].slice(2)}
function getMonday(ds){const d=new Date(ds+'T00:00:00');const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);const m=new Date(d);m.setDate(diff);return m.toISOString().slice(0,10)}
function weekLbl(m){const s=new Date(m+'T00:00:00');const e=new Date(s);e.setDate(e.getDate()+6);return s.toLocaleDateString('en-AU',{day:'numeric',month:'short'})+' – '+e.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}
function daysSince(dateStr){const d=new Date(dateStr+'T00:00:00');const s=new Date(PASS_START+'T00:00:00');return Math.round((d-s)/(864e5))}
function poolVisits(){return visits.filter(v=>v.pool!=='Open Water')}

function render(){
  const all=visits;
  const pv=poolVisits();
  const n=all.length;
  const pn=pv.length;
  const totalDist=all.reduce((s,v)=>s+(v.distance||0),0);
  const cpv=pn>0?(PASS_COST/pn):0;

  const td=todayStr();
  const tdD=new Date(td+'T00:00:00');
  const d7=new Date(tdD);d7.setDate(d7.getDate()-6);
  const d7s=d7.toISOString().slice(0,10);
  const roll7=all.filter(v=>v.date>=d7s&&v.date<=td).reduce((s,v)=>s+(v.distance||0),0);

  const mon=getMonday(td);
  const sunD=new Date(mon+'T00:00:00');sunD.setDate(sunD.getDate()+6);
  const sunS=sunD.toISOString().slice(0,10);
  const twDist=all.filter(v=>v.date>=mon&&v.date<=sunS).reduce((s,v)=>s+(v.distance||0),0);
  const twVis=all.filter(v=>v.date>=mon&&v.date<=sunS).length;

  const beLeft=Math.max(0,BE_NEEDED-pn);
  const bePct=Math.min(100,(pn/BE_NEEDED)*100);

  const passEnd=new Date(PASS_END+'T00:00:00');
  const now=new Date(td+'T00:00:00');
  const wksLeft=Math.max(0.1,(passEnd-now)/(7*864e5));
  const wklyNeeded=beLeft>0?(beLeft/wksLeft).toFixed(1):'0.0';

  document.getElementById('statGrid').innerHTML=
    '<div class="stat-card"><div class="stat-val">'+n+'</div><div class="stat-lbl">Total Visits</div></div>'+
    '<div class="stat-card"><div class="stat-val">$'+cpv.toFixed(2)+'</div><div class="stat-lbl">Cost / Visit</div><div class="stat-sub">Target ≤ $'+CASUAL_COST.toFixed(2)+'</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+(totalDist/1000).toFixed(1)+'<span>km</span></div><div class="stat-lbl">Total Distance</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+wklyNeeded+'</div><div class="stat-lbl">Visits/Wk Needed</div><div class="stat-sub">To break even by expiry</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+(roll7/1000).toFixed(1)+'<span>km</span></div><div class="stat-lbl">7-Day Rolling</div></div>'+
    '<div class="stat-card"><div class="stat-val">'+(twDist/1000).toFixed(1)+'<span>km</span></div><div class="stat-lbl">This Week</div><div class="stat-sub">'+twVis+' visit'+(twVis!==1?'s':'')+'</div></div>';

  document.getElementById('breakEvenCard').innerHTML=
    '<div class="card-title">Break-Even Progress</div>'+
    '<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:2px">'+
    '<span>'+pn+' of '+BE_NEEDED+' visits</span>'+
    '<span>'+(beLeft>0?beLeft+' to go':'✅ Achieved!')+'</span></div>'+
    '<div class="progress-wrap"><div class="progress-bar" style="width:'+bePct+'%"></div><div class="progress-txt">'+bePct.toFixed(1)+'%</div></div>'+
    '<div style="font-size:10px;color:var(--txs);margin-top:5px;text-align:center">Based on $'+CASUAL_COST.toFixed(2)+' casual swim entry · '+Math.ceil(wksLeft)+' weeks remaining</div>';

  const pools={};
  all.forEach(v=>{if(!pools[v.pool])pools[v.pool]={c:0,d:0};pools[v.pool].c++;pools[v.pool].d+=(v.distance||0)});
  let ph='';
  for(const[nm,dt]of Object.entries(pools)){
    ph+='<div class="pool-pill"><div class="pill-name">'+nm+'</div><div class="pill-count">'+dt.c+'</div><div class="pill-sub">'+(dt.d/1000).toFixed(1)+' km</div></div>';
  }
  document.getElementById('poolBreakdown').innerHTML='<div class="card-title">Pool Breakdown</div><div class="pool-pills">'+ph+'</div>';

  const tb=document.querySelector('#logTable tbody');tb.innerHTML='';
  for(let i=all.length-1;i>=0;i--){
    const v=all[i];
    const ac=(PASS_COST/(i+1)).toFixed(2);
    let cls='manly';if(v.pool==='Warringah')cls='warringah';if(v.pool==='Open Water')cls='openwater';
    const tr=document.createElement('tr');
    tr.innerHTML='<td style="font-weight:600;color:var(--txs)">'+(i+1)+'</td><td>'+fmtD(v.date)+'</td><td><span class="pool-tag '+cls+'">'+v.pool+'</span></td><td>'+(v.distance||0)+'m</td><td>$'+ac+'</td><td class="log-actions"><button onclick="openEdit('+i+')">✏️</button></td>';
    tb.appendChild(tr);
  }
  renderCharts();
}

let cD,cW,cP;
function renderCharts(){
  // Cumulative Distance (km)
  const lbl=visits.map((_,i)=>i+1);
  let cum=0;const cumD=visits.map(v=>{cum+=(v.distance||0);return +(cum/1000).toFixed(2)});
  if(cD)cD.destroy();
  cD=new Chart(document.getElementById('chartDist'),{
    type:'line',
    data:{labels:lbl,datasets:[{data:cumD,borderColor:'#1a73e8',backgroundColor:'rgba(26,115,232,.08)',fill:true,tension:.3,pointRadius:3,pointBackgroundColor:'#1a73e8',borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{title:{display:true,text:'Visit #',font:{size:11}},grid:{display:false}},y:{title:{display:true,text:'km',font:{size:11}},beginAtZero:true}}}
  });

  // Visits per Week
  const wm={};visits.forEach(v=>{const m=getMonday(v.date);wm[m]=(wm[m]||0)+1});
  const wks=Object.keys(wm).sort();
  if(cW)cW.destroy();
  cW=new Chart(document.getElementById('chartWeek'),{
    type:'bar',
    data:{labels:wks.map(weekLbl),datasets:[{data:wks.map(w=>wm[w]),backgroundColor:'rgba(79,195,247,.55)',borderColor:'#4fc3f7',borderWidth:1,borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });

  // Break-Even Projection
  const pv=poolVisits();
  const totalDays=365;

  // Required pace line
  const pacePoints=[];
  for(let d=0;d<=totalDays;d+=30)pacePoints.push({x:d,y:+(BE_NEEDED*d/totalDays).toFixed(1)});
  pacePoints.push({x:totalDays,y:BE_NEEDED});

  // Actual progress
  const actualPoints=[{x:0,y:0}];
  const byDate={};
  pv.forEach(v=>{byDate[v.date]=(byDate[v.date]||0)+1});
  const dates=Object.keys(byDate).sort();
  let cumV=0;
  dates.forEach(d=>{
    cumV+=byDate[d];
    actualPoints.push({x:daysSince(d),y:cumV});
  });

  // Today marker
  const todayDay=daysSince(todayStr());
  const todayVisits=pv.length;

  if(cP)cP.destroy();
  cP=new Chart(document.getElementById('chartProj'),{
    type:'scatter',
    data:{
      datasets:[
        {label:'Required Pace',data:pacePoints,showLine:true,borderColor:'#b0bec5',borderDash:[8,4],borderWidth:2,pointRadius:0,fill:false,tension:0},
        {label:'Your Progress',data:actualPoints,showLine:true,borderColor:'#4caf50',backgroundColor:'rgba(76,175,80,.08)',borderWidth:2.5,pointRadius:2,pointBackgroundColor:'#4caf50',fill:true,tension:0.1},
        {label:'Today',data:[{x:todayDay,y:todayVisits}],pointRadius:7,pointBackgroundColor:'#4caf50',pointBorderColor:'#fff',pointBorderWidth:2.5,showLine:false}
      ]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:true,labels:{font:{size:10},usePointStyle:true,pointStyle:'line'}},
        tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': Day '+ctx.parsed.x+', '+ctx.parsed.y+' visits'}}}
      },
      scales:{
        x:{type:'linear',min:0,max:totalDays,title:{display:true,text:'Days since pass start',font:{size:11}},grid:{display:false},ticks:{stepSize:60}},
        y:{type:'linear',min:0,suggestedMax:BE_NEEDED+10,title:{display:true,text:'Pool visits',font:{size:11}},ticks:{stepSize:20}}
      }
    }
  });
}

function openAdd(){editIdx=-1;document.getElementById('modalTitle').textContent='Add Visit';document.getElementById('inDate').value=todayStr();document.getElementById('inPool').value='Manly ABC';document.getElementById('inDist').value='';document.getElementById('modalBtns').innerHTML='<button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveVisit()">Save</button>';document.getElementById('modalBg').classList.add('show')}
function openEdit(i){editIdx=i;const v=visits[i];document.getElementById('modalTitle').textContent='Edit Visit #'+(i+1);document.getElementById('inDate').value=v.date;document.getElementById('inPool').value=v.pool;document.getElementById('inDist').value=v.distance||0;document.getElementById('modalBtns').innerHTML='<button class="btn-delete" onclick="delVisit()">Delete</button><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveVisit()">Save</button>';document.getElementById('modalBg').classList.add('show')}
function closeModal(){document.getElementById('modalBg').classList.remove('show')}
function saveVisit(){const d=document.getElementById('inDate').value;const p=document.getElementById('inPool').value;const m=parseInt(document.getElementById('inDist').value)||0;if(!d)return;if(editIdx>=0){visits[editIdx]={date:d,pool:p,distance:m}}else{visits.push({date:d,pool:p,distance:m})}save();closeModal();render()}
function delVisit(){if(editIdx>=0&&confirm('Delete this visit?')){visits.splice(editIdx,1);save();closeModal();render()}}

document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('tab-'+t.dataset.tab).classList.add('active');if(t.dataset.tab==='charts')setTimeout(renderCharts,50)})});

document.getElementById('fabAdd').addEventListener('click',openAdd);
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
document.getElementById('buildFooter').textContent='Built '+BUILD+' · v4.2';

load();render();
</script>
</body>
</html>
